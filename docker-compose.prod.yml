# Production environment — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# HTTPS with Let's Encrypt, real domain, basic auth on sensitive services
services:
  traefik:
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=beshtawi.ashraf@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${BASIC_AUTH_USERS}"
      - "traefik.http.middlewares.auth.basicauth.removeheader=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  portainer:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portainer.middlewares=auth"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  uptime-kuma:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime.rule=Host(`status.${DOMAIN}`)"
      - "traefik.http.routers.uptime.entrypoints=websecure"
      - "traefik.http.routers.uptime.tls.certresolver=letsencrypt"
      - "traefik.http.routers.uptime.middlewares=auth"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"

  glitchtip:
    environment:
      - GLITCHTIP_DOMAIN=https://errors.${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glitchtip.rule=Host(`errors.${DOMAIN}`)"
      - "traefik.http.routers.glitchtip.entrypoints=websecure"
      - "traefik.http.routers.glitchtip.tls.certresolver=letsencrypt"
      - "traefik.http.routers.glitchtip.middlewares=auth"
      - "traefik.http.services.glitchtip.loadbalancer.server.port=8000"

  glitchtip-worker:
    environment:
      - GLITCHTIP_DOMAIN=https://errors.${DOMAIN}

  admin:
    environment:
      - ADMIN_SCHEME=https
      - ADMIN_DOMAIN=${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.${DOMAIN}`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.admin.middlewares=auth"
      - "traefik.http.services.admin.loadbalancer.server.port=80"

  dogeclaw:
    environment:
      - DOGECLAW_WEBHOOK_URL=https://dogeclaw.${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dogeclaw.rule=Host(`dogeclaw.${DOMAIN}`)"
      - "traefik.http.routers.dogeclaw.entrypoints=websecure"
      - "traefik.http.routers.dogeclaw.tls.certresolver=letsencrypt"
      - "traefik.http.services.dogeclaw.loadbalancer.server.port=3000"

  kiwelt:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kiwelt.rule=Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.kiwelt.entrypoints=websecure"
      - "traefik.http.routers.kiwelt.tls.certresolver=letsencrypt"
      - "traefik.http.services.kiwelt.loadbalancer.server.port=3000"
      # Apex → www permanent redirect (subdomain-only routing).
      - "traefik.http.routers.apex-redirect.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.apex-redirect.entrypoints=websecure"
      - "traefik.http.routers.apex-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.apex-redirect.service=kiwelt"
      - "traefik.http.routers.apex-redirect.middlewares=apex-to-www"
      - "traefik.http.middlewares.apex-to-www.redirectregex.regex=^https?://${DOMAIN}/(.*)"
      - "traefik.http.middlewares.apex-to-www.redirectregex.replacement=https://www.${DOMAIN}/$${1}"
      - "traefik.http.middlewares.apex-to-www.redirectregex.permanent=true"
