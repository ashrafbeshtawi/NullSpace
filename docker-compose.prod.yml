# Production environment — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# HTTPS with Let's Encrypt, real domain, basic auth on sensitive services
services:
  traefik:
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=beshtawi.ashraf@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${BASIC_AUTH_USERS}"
      - "traefik.http.middlewares.auth.basicauth.removeheader=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  portainer:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portainer.middlewares=auth"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  dbgate:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dbgate.rule=Host(`db.${DOMAIN}`)"
      - "traefik.http.routers.dbgate.entrypoints=websecure"
      - "traefik.http.routers.dbgate.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dbgate.middlewares=auth"
      - "traefik.http.services.dbgate.loadbalancer.server.port=3000"

  uptime-kuma:
    labels:
      - "traefik.enable=true"
      # Protected router for the UI — basic auth in front of everything by default.
      - "traefik.http.routers.uptime.rule=Host(`status.${DOMAIN}`)"
      - "traefik.http.routers.uptime.entrypoints=websecure"
      - "traefik.http.routers.uptime.tls.certresolver=letsencrypt"
      - "traefik.http.routers.uptime.middlewares=auth"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"
      # Public router for the Push API only. Push URLs are token-bearing
      # (the random suffix is the auth), so basic-auth in front of them
      # would break heartbeat clients (e.g. bin/backup-offsite.sh).
      # Higher priority so it always wins over the catch-all UI router.
      - "traefik.http.routers.uptime-push.rule=Host(`status.${DOMAIN}`) && PathPrefix(`/api/push`)"
      - "traefik.http.routers.uptime-push.entrypoints=websecure"
      - "traefik.http.routers.uptime-push.tls.certresolver=letsencrypt"
      - "traefik.http.routers.uptime-push.service=uptime"
      - "traefik.http.routers.uptime-push.priority=100"

  glitchtip:
    environment:
      - GLITCHTIP_DOMAIN=https://errors.${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glitchtip.rule=Host(`errors.${DOMAIN}`)"
      - "traefik.http.routers.glitchtip.entrypoints=websecure"
      - "traefik.http.routers.glitchtip.tls.certresolver=letsencrypt"
      - "traefik.http.routers.glitchtip.middlewares=auth"
      - "traefik.http.services.glitchtip.loadbalancer.server.port=8000"

  glitchtip-worker:
    environment:
      - GLITCHTIP_DOMAIN=https://errors.${DOMAIN}

  admin:
    environment:
      - ADMIN_SCHEME=https
      - ADMIN_DOMAIN=${DOMAIN}
    # Read-only access to the off-site backup credentials so the admin
    # panel's Backup Restore buttons can run bin/backup-offsite.sh and
    # bin/restore-offsite.sh — those scripts source /etc/nullspace-backup.env.
    # create_host_path: false makes the container fail to start (loudly)
    # if the file is missing on the VPS, rather than silently creating an
    # empty directory at that path.
    volumes:
      - type: bind
        source: /etc/nullspace-backup.env
        target: /etc/nullspace-backup.env
        read_only: true
        bind:
          create_host_path: false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.${DOMAIN}`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.admin.middlewares=auth"
      - "traefik.http.services.admin.loadbalancer.server.port=80"

  dogeclaw:
    environment:
      - DOGECLAW_WEBHOOK_URL=https://dogeclaw.${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dogeclaw.rule=Host(`dogeclaw.${DOMAIN}`)"
      - "traefik.http.routers.dogeclaw.entrypoints=websecure"
      - "traefik.http.routers.dogeclaw.tls.certresolver=letsencrypt"
      - "traefik.http.services.dogeclaw.loadbalancer.server.port=3000"

  telebot:
    labels:
      - "traefik.enable=true"
      # Protected router for the homepage + /admin (basic auth in front).
      - "traefik.http.routers.telebot.rule=Host(`bot.${DOMAIN}`)"
      - "traefik.http.routers.telebot.entrypoints=websecure"
      - "traefik.http.routers.telebot.tls.certresolver=letsencrypt"
      - "traefik.http.routers.telebot.middlewares=auth"
      - "traefik.http.services.telebot.loadbalancer.server.port=3000"
      # Public router for /api/webhook + /api/auto-match. Telegram cannot
      # send basic-auth credentials with webhook deliveries, and the
      # auto-match endpoint authenticates via its own x-auto-match-secret
      # header. Higher priority so it always wins over the catch-all
      # protected router for matching paths.
      - "traefik.http.routers.telebot-public.rule=Host(`bot.${DOMAIN}`) && (PathPrefix(`/api/webhook`) || PathPrefix(`/api/auto-match`))"
      - "traefik.http.routers.telebot-public.entrypoints=websecure"
      - "traefik.http.routers.telebot-public.tls.certresolver=letsencrypt"
      - "traefik.http.routers.telebot-public.service=telebot"
      - "traefik.http.routers.telebot-public.priority=100"

  kiwelt:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kiwelt.rule=Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.kiwelt.entrypoints=websecure"
      - "traefik.http.routers.kiwelt.tls.certresolver=letsencrypt"
      - "traefik.http.services.kiwelt.loadbalancer.server.port=3000"
      # Apex → www permanent redirect (subdomain-only routing).
      - "traefik.http.routers.apex-redirect.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.apex-redirect.entrypoints=websecure"
      - "traefik.http.routers.apex-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.apex-redirect.service=kiwelt"
      - "traefik.http.routers.apex-redirect.middlewares=apex-to-www"
      - "traefik.http.middlewares.apex-to-www.redirectregex.regex=^https?://${DOMAIN}/(.*)"
      - "traefik.http.middlewares.apex-to-www.redirectregex.replacement=https://www.${DOMAIN}/$${1}"
      - "traefik.http.middlewares.apex-to-www.redirectregex.permanent=true"
