<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogeClaw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #060609; color: #e2e8f0; height: 100vh; display: flex; }
        .sidebar { width: 260px; background: #0c0c14; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 1rem; }
        .sidebar h2 { font-size: 1rem; font-weight: 800; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between; }
        .sidebar h2 button { background: #34d399; color: #060609; border: none; border-radius: 6px; padding: 0.3rem 0.6rem; font-size: 0.75rem; cursor: pointer; font-weight: 700; }
        .agent-select { width: 100%; padding: 0.4rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; background: #060609; color: #e2e8f0; font-size: 0.8rem; margin-bottom: 0.75rem; }
        .sessions { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.3rem; }
        .session-item { padding: 0.5rem 0.75rem; border-radius: 8px; cursor: pointer; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; }
        .session-item:hover { background: rgba(255,255,255,0.05); }
        .session-item.active { background: rgba(52,211,153,0.1); color: #34d399; }
        .session-item .del { opacity: 0; font-size: 0.7rem; cursor: pointer; color: #f87171; }
        .session-item:hover .del { opacity: 1; }
        .sidebar-footer { margin-top: auto; padding-top: 1rem; display: flex; gap: 0.5rem; }
        .sidebar-footer button { flex: 1; padding: 0.5rem; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #64748b; cursor: pointer; font-size: 0.75rem; }
        .sidebar-footer button:hover { color: #e2e8f0; border-color: rgba(255,255,255,0.2); }
        .main { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .msg { max-width: 80%; padding: 0.8rem 1rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: #1e3a5f; }
        .msg.assistant { align-self: flex-start; background: #0c0c14; border: 1px solid rgba(255,255,255,0.05); }
        .msg .image-preview { max-width: 200px; max-height: 150px; border-radius: 8px; margin-bottom: 0.5rem; display: block; }
        .thinking-block { font-size: 0.8rem; color: #64748b; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 0.5rem; overflow: hidden; }
        .thinking-toggle { padding: 0.4rem 0.6rem; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; }
        .thinking-toggle:hover { background: rgba(255,255,255,0.03); }
        .thinking-content { padding: 0.4rem 0.6rem; white-space: pre-wrap; max-height: 200px; overflow-y: auto; display: none; border-top: 1px solid rgba(255,255,255,0.05); }
        .thinking-content.open { display: block; }
        .streaming { opacity: 0.7; }
        .input-area { padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 0.5rem; align-items: flex-end; }
        .input-area textarea { flex: 1; padding: 0.7rem 1rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: #0c0c14; color: #e2e8f0; font-size: 0.9rem; resize: none; outline: none; font-family: inherit; min-height: 44px; max-height: 120px; }
        .input-area textarea:focus { border-color: #34d399; }
        .input-area button { padding: 0.7rem; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; min-width: 44px; }
        .send-btn { background: #34d399; color: #060609; font-weight: 700; padding: 0.7rem 1.2rem !important; }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .media-btn { background: rgba(255,255,255,0.05); color: #94a3b8; }
        .media-btn:hover { background: rgba(255,255,255,0.1); }
        .media-btn.recording { background: rgba(248,113,113,0.3); color: #f87171; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .file-preview { padding: 0.5rem 1.5rem; display: none; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: #94a3b8; }
        .file-preview img { max-height: 60px; border-radius: 6px; }
        .file-preview .remove { cursor: pointer; color: #f87171; margin-left: auto; }
        @media (max-width: 700px) { .sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>DogeClaw <button onclick="newSession()">+ New</button></h2>
        <select class="agent-select" id="agentSelect" onchange="onAgentChange()"></select>
        <div class="sessions" id="sessions"></div>
        <div class="sidebar-footer">
            <button onclick="window.location='/admin'">Admin</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="main">
        <div class="messages" id="messages"></div>
        <div class="file-preview" id="filePreview">
            <img id="previewImg" src="" alt="">
            <span id="previewName"></span>
            <span class="remove" onclick="clearFile()">&times;</span>
        </div>
        <div class="input-area">
            <button class="media-btn" onclick="document.getElementById('fileInput').click()" title="Attach image">&#128206;</button>
            <input type="file" id="fileInput" accept="image/*,audio/*" style="display:none" onchange="onFileSelect(event)">
            <button class="media-btn" id="micBtn" onclick="toggleRecording()" title="Record voice">&#127908;</button>
            <textarea id="input" placeholder="Message DogeClaw..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
            <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
        </div>
    </div>
    <script>
        let sessionId = null;
        let sending = false;
        let currentAgentId = null;
        let pendingFile = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let agents = [];

        async function loadAgents() {
            const res = await fetch('/api/agents');
            if (res.status === 401) return window.location.href = '/login';
            const data = await res.json();
            agents = data.agents;
            const sel = document.getElementById('agentSelect');
            sel.innerHTML = agents.map(a => `<option value="${a.id}" ${a.id === currentAgentId ? 'selected' : ''}>${a.name}</option>`).join('');
            if (!currentAgentId && agents.length) currentAgentId = agents[0].id;
        }

        function onAgentChange() {
            currentAgentId = parseInt(document.getElementById('agentSelect').value);
        }

        async function loadSessions() {
            const res = await fetch('/api/sessions');
            if (res.status === 401) return window.location.href = '/login';
            const { sessions } = await res.json();
            const el = document.getElementById('sessions');
            el.innerHTML = sessions.map(s =>
                `<div class="session-item ${s.id === sessionId ? 'active' : ''}" onclick="switchSession('${s.id}')">
                    <span>${s.source === 'telegram' ? '[TG] ' : ''}${s.agentName || 'default'}: ${s.preview || s.id.slice(0,8)}</span>
                    <span class="del" onclick="event.stopPropagation();deleteSession('${s.id}')">&times;</span>
                </div>`
            ).join('');
        }

        function newSession() {
            sessionId = null;
            document.getElementById('messages').innerHTML = '';
            loadSessions();
        }

        async function switchSession(id) {
            sessionId = id;
            const res = await fetch(`/api/sessions/${id}`);
            if (!res.ok) return;
            const data = await res.json();
            if (data.agentId) { currentAgentId = data.agentId; document.getElementById('agentSelect').value = data.agentId; }
            const el = document.getElementById('messages');
            el.innerHTML = '';
            for (const msg of (data.messages || [])) {
                if (msg.role === 'user') addMessage('user', msg.content, msg.hasImage);
                else if (msg.role === 'assistant') addAssistantMessage(msg.content, msg.thinking);
            }
            loadSessions();
        }

        async function deleteSession(id) {
            await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
            if (sessionId === id) newSession();
            else loadSessions();
        }

        function addMessage(role, content, hasImage) {
            const el = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = content;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        function addAssistantMessage(content, thinking) {
            const el = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg assistant';
            if (thinking) {
                const tb = document.createElement('div');
                tb.className = 'thinking-block';
                tb.innerHTML = `<div class="thinking-toggle" onclick="this.nextElementSibling.classList.toggle('open')">&#9656; Thinking</div><div class="thinking-content">${escapeHtml(thinking)}</div>`;
                div.appendChild(tb);
            }
            const text = document.createElement('div');
            text.textContent = content;
            div.appendChild(text);
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function onFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            pendingFile = file;
            const preview = document.getElementById('filePreview');
            preview.style.display = 'flex';
            document.getElementById('previewName').textContent = file.name;
            if (file.type.startsWith('image/')) {
                const img = document.getElementById('previewImg');
                img.src = URL.createObjectURL(file);
                img.style.display = 'block';
            } else {
                document.getElementById('previewImg').style.display = 'none';
            }
        }

        function clearFile() {
            pendingFile = null;
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        async function toggleRecording() {
            const btn = document.getElementById('micBtn');
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                btn.classList.remove('recording');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    pendingFile = new File([blob], 'recording.webm', { type: mediaRecorder.mimeType });
                    document.getElementById('filePreview').style.display = 'flex';
                    document.getElementById('previewImg').style.display = 'none';
                    document.getElementById('previewName').textContent = 'Voice recording';
                    send();
                };
                mediaRecorder.start();
                btn.classList.add('recording');
            } catch (err) {
                alert('Microphone access denied');
            }
        }

        async function send() {
            if (sending) return;
            const input = document.getElementById('input');
            const text = input.value.trim();
            const hasFile = !!pendingFile;
            if (!text && !hasFile) return;

            input.value = '';
            const isAudio = hasFile && pendingFile.type.startsWith('audio/');
            const isImage = hasFile && pendingFile.type.startsWith('image/');
            if (text) addMessage('user', text);
            if (isImage) addMessage('user', '[image: ' + pendingFile.name + ']');
            if (isAudio) addMessage('user', '[voice message]');

            // Show streaming container immediately
            const messagesEl = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg assistant streaming';
            const thinkDiv = document.createElement('div');
            thinkDiv.className = 'thinking-block';
            thinkDiv.style.display = 'none';
            thinkDiv.innerHTML = '<div class="thinking-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">&#9656; Thinking...</div><div class="thinking-content open"></div>';
            msgDiv.appendChild(thinkDiv);
            const contentDiv = document.createElement('div');
            contentDiv.textContent = isAudio ? 'Transcribing audio...' : 'Thinking...';
            msgDiv.appendChild(contentDiv);
            messagesEl.appendChild(msgDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            sending = true;
            document.getElementById('sendBtn').disabled = true;

            // Convert file to base64
            let images = null;
            let audio = null;
            let audioMime = null;
            if (isImage) {
                images = [await fileToBase64(pendingFile)];
            } else if (isAudio) {
                audio = await fileToBase64(pendingFile);
                audioMime = pendingFile.type;
            }
            clearFile();

            contentDiv.textContent = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId, agentId: currentAgentId, images, audio, audioMime }),
                });

                if (res.status === 401) return window.location.href = '/login';

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let thinkingText = '';
                let contentText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            var eventType = line.slice(7);
                        } else if (line.startsWith('data: ') && eventType) {
                            const data = JSON.parse(line.slice(6));
                            if (eventType === 'status') {
                                contentDiv.textContent = data;
                            } else if (eventType === 'transcript') {
                                contentDiv.textContent = 'You said: "' + data + '"\nThinking...';
                            } else if (eventType === 'thinking') {
                                thinkDiv.style.display = 'block';
                                thinkingText += data;
                                thinkDiv.querySelector('.thinking-content').textContent = thinkingText;
                                contentDiv.textContent = contentText || '';
                            } else if (eventType === 'content') {
                                contentText += data;
                                contentDiv.textContent = contentText;
                            } else if (eventType === 'tool_calls') {
                                contentDiv.textContent += '\n[Using tools...]\n';
                            } else if (eventType === 'done') {
                                sessionId = data.sessionId;
                                loadSessions();
                            } else if (eventType === 'error') {
                                contentDiv.textContent = 'Error: ' + data.message;
                            }
                            messagesEl.scrollTop = messagesEl.scrollHeight;
                            eventType = null;
                        }
                    }
                }

                // Finalize: collapse thinking, remove streaming class
                msgDiv.classList.remove('streaming');
                if (thinkingText) {
                    thinkDiv.querySelector('.thinking-toggle').innerHTML = '&#9656; Thinking';
                    thinkDiv.querySelector('.thinking-content').classList.remove('open');
                }
            } catch (err) {
                contentDiv.textContent = `Error: ${err.message}`;
                msgDiv.classList.remove('streaming');
            } finally {
                sending = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        loadAgents();
        loadSessions();
    </script>
</body>
</html>
