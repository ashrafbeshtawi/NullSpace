<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogeClaw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e2e8f0; height: 100vh; display: flex; }

        /* Sidebar */
        .sidebar { width: 280px; background: #0e0e16; border-right: 1px solid rgba(220,38,38,0.1); display: flex; flex-direction: column; }
        .sidebar-header { padding: 1.5rem 1.25rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; text-align: center; }
        .sidebar-header img { width: 110px; height: auto; filter: drop-shadow(0 4px 16px rgba(220,38,38,0.35)); transition: transform 0.2s; }
        .sidebar-header img:hover { transform: scale(1.05); }
        .sidebar-header h2 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; background: linear-gradient(135deg, #fff 0%, #fca5a5 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .sidebar-controls { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-controls select { width: 100%; padding: 0.4rem 0.6rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; background: rgba(255,255,255,0.03); color: #e2e8f0; font-size: 0.8rem; }
        .new-chat-btn { width: 100%; padding: 0.5rem; border: 1px dashed rgba(220,38,38,0.3); border-radius: 8px; background: transparent; color: #dc2626; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .new-chat-btn:hover { background: rgba(220,38,38,0.08); border-style: solid; }
        .sessions { flex: 1; overflow-y: auto; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.25rem; }
        .session-item { padding: 0.6rem 0.75rem; border-radius: 8px; cursor: pointer; font-size: 0.8rem; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; transition: all 0.15s; border: 1px solid transparent; }
        .session-item:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.05); }
        .session-item.active { background: rgba(220,38,38,0.08); border-color: rgba(220,38,38,0.15); color: #fca5a5; }
        .session-item .label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .session-item .src { font-size: 0.65rem; background: rgba(255,255,255,0.06); padding: 0.1rem 0.35rem; border-radius: 4px; margin-right: 0.4rem; flex-shrink: 0; }
        .session-item .del { opacity: 0; font-size: 0.7rem; cursor: pointer; color: #f87171; flex-shrink: 0; }
        .session-item:hover .del { opacity: 1; }
        .sidebar-footer { padding: 0.75rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 0.5rem; }
        .sidebar-footer button { flex: 1; padding: 0.45rem; background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: #64748b; cursor: pointer; font-size: 0.75rem; transition: all 0.15s; }
        .sidebar-footer button:hover { color: #e2e8f0; border-color: rgba(255,255,255,0.15); }

        /* Main chat */
        .main { flex: 1; display: flex; flex-direction: column; background-image: radial-gradient(ellipse at 80% 20%, rgba(220,38,38,0.03) 0%, transparent 50%); }
        .messages { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1rem; }
        .msg { max-width: 75%; padding: 0.9rem 1.1rem; border-radius: 14px; font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .msg.user { align-self: flex-end; background: linear-gradient(135deg, #1e293b 0%, #1a2332 100%); border: 1px solid rgba(255,255,255,0.06); }
        .msg.assistant { align-self: flex-start; background: #12121c; border: 1px solid rgba(255,255,255,0.05); }
        .msg .image-preview { max-width: 200px; max-height: 150px; border-radius: 8px; margin-bottom: 0.5rem; display: block; }

        /* Thinking block */
        .thinking-block { font-size: 0.8rem; color: #64748b; background: rgba(220,38,38,0.03); border: 1px solid rgba(220,38,38,0.08); border-radius: 8px; margin-bottom: 0.5rem; overflow: hidden; }
        .thinking-toggle { padding: 0.4rem 0.6rem; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; transition: background 0.15s; }
        .thinking-toggle:hover { background: rgba(220,38,38,0.05); }
        .thinking-content { padding: 0.5rem 0.6rem; white-space: pre-wrap; max-height: 200px; overflow-y: auto; display: none; border-top: 1px solid rgba(220,38,38,0.08); font-size: 0.75rem; }
        .thinking-content.open { display: block; }

        /* Spinner */
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(220,38,38,0.2); border-top-color: #dc2626; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-text { color: #94a3b8; font-size: 0.85rem; }
        .streaming .status-row { display: flex; align-items: center; margin-bottom: 0.5rem; }
        .status-row { display: none; }

        /* Input area */
        .file-preview { padding: 0.5rem 2rem; display: none; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: #94a3b8; }
        .file-preview img { max-height: 60px; border-radius: 6px; }
        .file-preview .remove { cursor: pointer; color: #f87171; margin-left: auto; }
        .input-area { padding: 1rem 2rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 0.5rem; align-items: flex-end; }
        .input-area textarea { flex: 1; padding: 0.75rem 1rem; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; background: rgba(255,255,255,0.03); color: #e2e8f0; font-size: 0.9rem; resize: none; outline: none; font-family: inherit; min-height: 46px; max-height: 120px; transition: border-color 0.2s; }
        .input-area textarea:focus { border-color: rgba(220,38,38,0.4); }
        .input-area button { padding: 0.75rem; border: none; border-radius: 12px; cursor: pointer; font-size: 0.9rem; min-width: 46px; transition: all 0.15s; }
        .send-btn { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); color: #fff; font-weight: 700; padding: 0.75rem 1.2rem !important; }
        .send-btn:hover { box-shadow: 0 4px 15px rgba(220,38,38,0.3); }
        .send-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
        .media-btn { background: rgba(255,255,255,0.04); color: #64748b; border: 1px solid rgba(255,255,255,0.08); }
        .media-btn:hover { background: rgba(255,255,255,0.08); color: #e2e8f0; }
        .media-btn.recording { background: rgba(220,38,38,0.15); color: #dc2626; border-color: rgba(220,38,38,0.3); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Empty state */
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.6; }
        .empty-state img { width: 220px; margin-bottom: 1.5rem; filter: drop-shadow(0 8px 24px rgba(220,38,38,0.25)); animation: breathe 4s ease-in-out infinite; }
        .empty-state p { font-size: 0.95rem; color: #64748b; }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        @media (max-width: 700px) { .sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="/static/logo.png" alt="DogeClaw">
            <h2>DogeClaw</h2>
        </div>
        <div class="sidebar-controls">
            <select id="agentSelect" onchange="onAgentChange()"></select>
            <button class="new-chat-btn" onclick="newSession()">+ New Chat</button>
        </div>
        <div class="sessions" id="sessions"></div>
        <div class="sidebar-footer">
            <button onclick="window.location='/admin'">Admin</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="main">
        <div class="messages" id="messages">
            <div class="empty-state" id="emptyState">
                <img src="/static/logo.png" alt="">
                <p>Start a conversation</p>
            </div>
        </div>
        <div class="file-preview" id="filePreview">
            <img id="previewImg" src="" alt="">
            <span id="previewName"></span>
            <span class="remove" onclick="clearFile()">&times;</span>
        </div>
        <div class="input-area">
            <button class="media-btn" onclick="document.getElementById('fileInput').click()" title="Attach file">&#128206;</button>
            <input type="file" id="fileInput" accept="image/*,audio/*" style="display:none" onchange="onFileSelect(event)">
            <button class="media-btn" id="micBtn" onclick="toggleRecording()" title="Record voice">&#127908;</button>
            <textarea id="input" placeholder="Message DogeClaw..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
            <button class="send-btn" id="sendBtn" onclick="send()">Send</button>
        </div>
    </div>
    <script>
        var sessionId = null, sending = false, currentAgentId = null, pendingFile = null, mediaRecorder = null, audioChunks = [], agents = [];

        async function loadAgents() {
            var [agentsRes, modelsRes] = await Promise.all([fetch('/api/agents'), fetch('/api/models')]);
            if (agentsRes.status === 401 || modelsRes.status === 401) return window.location.href = '/login';
            var agentData = await agentsRes.json();
            var modelData = await modelsRes.json();
            agents = agentData.agents;
            var hasModels = modelData.models?.length > 0;
            var hasUsableAgent = agents.some(function(a) { return a.model_id; });

            var sel = document.getElementById('agentSelect');
            var sendBtn = document.getElementById('sendBtn');
            var input = document.getElementById('input');

            if (!hasModels || !hasUsableAgent) {
                sel.innerHTML = '<option>(no agents)</option>';
                sel.disabled = true;
                sendBtn.disabled = true;
                input.disabled = true;
                input.placeholder = !hasModels ? 'Add a model in admin first...' : 'Assign a model to an agent in admin...';
                showSetupEmptyState(hasModels);
                return;
            }

            sel.disabled = false;
            sendBtn.disabled = false;
            input.disabled = false;
            input.placeholder = 'Message DogeClaw...';

            sel.innerHTML = agents.filter(function(a) { return a.model_id; }).map(function(a) {
                return '<option value="' + a.id + '"' + (a.id === currentAgentId ? ' selected' : '') + '>' + a.name + '</option>';
            }).join('');
            if (!currentAgentId && agents.length) currentAgentId = agents.find(function(a) { return a.model_id; })?.id;
        }

        function showSetupEmptyState(hasModels) {
            var el = document.getElementById('messages');
            var msg = !hasModels
                ? 'No models configured yet. Add one in the admin to start chatting.'
                : 'You have models but no agent uses them. Assign a model to an agent in the admin.';
            el.innerHTML = '<div class="empty-state"><img src="/static/logo.png" alt=""><p style="margin-bottom:1rem">' + msg + '</p><button class="new-chat-btn" style="max-width:200px;border-style:solid" onclick="window.location=\'/admin\'">Open Admin</button></div>';
        }

        function onAgentChange() { currentAgentId = parseInt(document.getElementById('agentSelect').value); }

        async function loadSessions() {
            var res = await fetch('/api/sessions');
            if (res.status === 401) return window.location.href = '/login';
            var data = await res.json();
            var el = document.getElementById('sessions');
            el.innerHTML = data.sessions.map(function(s) {
                var src = s.source === 'telegram' ? '<span class="src">TG</span>' : '';
                return '<div class="session-item ' + (s.id === sessionId ? 'active' : '') + '" onclick="switchSession(\'' + s.id + '\')">'
                    + src + '<span class="label">' + (s.preview || s.id.slice(0,8) + '...') + '</span>'
                    + '<span class="del" onclick="event.stopPropagation();deleteSession(\'' + s.id + '\')">&times;</span></div>';
            }).join('');
        }

        function newSession() {
            sessionId = null;
            document.getElementById('messages').innerHTML = '<div class="empty-state" id="emptyState"><img src="/static/logo.png" alt=""><p>Start a conversation</p></div>';
            loadSessions();
        }

        async function switchSession(id) {
            sessionId = id;
            var res = await fetch('/api/sessions/' + id);
            if (!res.ok) return;
            var data = await res.json();
            if (data.agentId) { currentAgentId = data.agentId; document.getElementById('agentSelect').value = data.agentId; }
            var el = document.getElementById('messages');
            el.innerHTML = '';
            (data.messages || []).forEach(function(msg) {
                if (msg.role === 'user') addMessage('user', msg.content);
                else if (msg.role === 'assistant') addAssistantMessage(msg.content, msg.thinking, msg.toolCalls);
            });
            loadSessions();
        }

        async function deleteSession(id) {
            await fetch('/api/sessions/' + id, { method: 'DELETE' });
            if (sessionId === id) newSession();
            else loadSessions();
        }

        function hideEmpty() {
            var e = document.getElementById('emptyState');
            if (e) e.remove();
        }

        function addMessage(role, content) {
            hideEmpty();
            var el = document.getElementById('messages');
            var div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = content;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        function addAssistantMessage(content, thinking, toolCalls) {
            hideEmpty();
            var el = document.getElementById('messages');
            var div = document.createElement('div');
            div.className = 'msg assistant';
            if (thinking) {
                var tb = document.createElement('div');
                tb.className = 'thinking-block';
                tb.innerHTML = '<div class="thinking-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">&#9656; Thinking</div><div class="thinking-content">' + escapeHtml(thinking) + '</div>';
                div.appendChild(tb);
            }
            if (toolCalls && toolCalls.length) {
                var tcBlock = document.createElement('div');
                tcBlock.className = 'thinking-block';
                var summary = toolCalls.map(function(tc) { return tc.name; }).join(', ');
                var details = toolCalls.map(function(tc) {
                    var args = typeof tc.args === 'string' ? tc.args : JSON.stringify(tc.args, null, 2);
                    var res = typeof tc.result === 'string' ? tc.result : JSON.stringify(tc.result, null, 2);
                    return '> ' + tc.name + '(' + args.slice(0, 200) + ')\n' + res.slice(0, 500);
                }).join('\n\n');
                tcBlock.innerHTML = '<div class="thinking-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">&#128295; Tools: ' + escapeHtml(summary) + '</div><div class="thinking-content">' + escapeHtml(details) + '</div>';
                div.appendChild(tcBlock);
            }
            var text = document.createElement('div');
            text.textContent = content;
            div.appendChild(text);
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function onFileSelect(e) {
            var file = e.target.files[0];
            if (!file) return;
            pendingFile = file;
            document.getElementById('filePreview').style.display = 'flex';
            document.getElementById('previewName').textContent = file.name;
            if (file.type.startsWith('image/')) {
                var img = document.getElementById('previewImg');
                img.src = URL.createObjectURL(file);
                img.style.display = 'block';
            } else {
                document.getElementById('previewImg').style.display = 'none';
            }
        }

        function clearFile() {
            pendingFile = null;
            document.getElementById('filePreview').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        async function toggleRecording() {
            var btn = document.getElementById('micBtn');
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                btn.classList.remove('recording');
                return;
            }
            try {
                var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };
                mediaRecorder.onstop = async function() {
                    stream.getTracks().forEach(function(t) { t.stop(); });
                    var blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    pendingFile = new File([blob], 'recording.webm', { type: mediaRecorder.mimeType });
                    document.getElementById('filePreview').style.display = 'flex';
                    document.getElementById('previewImg').style.display = 'none';
                    document.getElementById('previewName').textContent = 'Voice recording';
                    send();
                };
                mediaRecorder.start();
                btn.classList.add('recording');
            } catch (err) { alert('Microphone access denied'); }
        }

        async function send() {
            if (sending) return;
            var input = document.getElementById('input');
            var text = input.value.trim();
            var hasFile = !!pendingFile;
            if (!text && !hasFile) return;

            hideEmpty();
            input.value = '';
            var isAudio = hasFile && pendingFile.type.startsWith('audio/');
            var isImage = hasFile && pendingFile.type.startsWith('image/');
            if (text) addMessage('user', text);
            if (isImage) addMessage('user', '[image: ' + pendingFile.name + ']');
            if (isAudio) addMessage('user', '[voice message]');

            // Show streaming container with spinner immediately
            var messagesEl = document.getElementById('messages');
            var msgDiv = document.createElement('div');
            msgDiv.className = 'msg assistant streaming';
            var statusRow = document.createElement('div');
            statusRow.className = 'status-row';
            statusRow.innerHTML = '<div class="spinner"></div><span class="status-text">Processing...</span>';
            msgDiv.appendChild(statusRow);
            var thinkDiv = document.createElement('div');
            thinkDiv.className = 'thinking-block';
            thinkDiv.style.display = 'none';
            thinkDiv.innerHTML = '<div class="thinking-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">&#9656; Thinking...</div><div class="thinking-content open"></div>';
            msgDiv.appendChild(thinkDiv);
            var contentDiv = document.createElement('div');
            msgDiv.appendChild(contentDiv);
            messagesEl.appendChild(msgDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            sending = true;
            document.getElementById('sendBtn').disabled = true;

            var images = null, audio = null, audioMime = null;
            if (isImage) { images = [await fileToBase64(pendingFile)]; }
            else if (isAudio) { audio = await fileToBase64(pendingFile); audioMime = pendingFile.type; }
            clearFile();

            try {
                var res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, sessionId: sessionId, agentId: currentAgentId, images: images, audio: audio, audioMime: audioMime }),
                });
                if (res.status === 401) return window.location.href = '/login';

                // Tool calls container (live)
                var toolsDiv = document.createElement('div');
                toolsDiv.style.display = 'none';
                msgDiv.insertBefore(toolsDiv, contentDiv);
                var pendingToolNames = [];

                var reader = res.body.getReader();
                var decoder = new TextDecoder();
                var buffer = '', thinkingText = '', contentText = '', eventType = null;

                while (true) {
                    var result = await reader.read();
                    if (result.done) break;
                    buffer += decoder.decode(result.value, { stream: true });
                    var lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i];
                        if (line.startsWith('event: ')) {
                            eventType = line.slice(7);
                        } else if (line.startsWith('data: ') && eventType) {
                            var data = JSON.parse(line.slice(6));
                            if (eventType === 'status') {
                                statusRow.querySelector('.status-text').textContent = data;
                            } else if (eventType === 'transcript') {
                                statusRow.querySelector('.status-text').textContent = 'Heard: "' + data.slice(0, 60) + '"';
                            } else if (eventType === 'thinking') {
                                thinkDiv.style.display = 'block';
                                thinkingText += data;
                                thinkDiv.querySelector('.thinking-content').textContent = thinkingText;
                                statusRow.querySelector('.status-text').textContent = 'Thinking...';
                            } else if (eventType === 'content') {
                                contentText += data;
                                contentDiv.textContent = contentText;
                                statusRow.querySelector('.status-text').textContent = 'Generating...';
                            } else if (eventType === 'tool_calls') {
                                toolsDiv.style.display = 'block';
                                toolsDiv.className = 'thinking-block';
                                pendingToolNames = data.map(function(tc) { return tc.function.name; });
                                var args = data.map(function(tc) { return tc.function.name + '(' + JSON.stringify(tc.function.arguments).slice(0, 150) + ')'; }).join('\n');
                                toolsDiv.innerHTML = '<div class="thinking-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">&#128295; ' + escapeHtml(pendingToolNames.join(', ')) + '</div><div class="thinking-content open">' + escapeHtml(args) + '</div>';
                                statusRow.querySelector('.status-text').textContent = 'Using: ' + pendingToolNames.join(', ');
                            } else if (eventType === 'tool_result') {
                                var resultStr = JSON.stringify(data.result).slice(0, 500);
                                var tcContent = toolsDiv.querySelector('.thinking-content');
                                if (tcContent) tcContent.textContent += '\n\n> ' + data.name + ' result:\n' + resultStr;
                                statusRow.querySelector('.status-text').textContent = 'Got result from ' + data.name;
                            } else if (eventType === 'done') {
                                sessionId = data.sessionId;
                                loadSessions();
                            } else if (eventType === 'error') {
                                contentDiv.textContent = 'Error: ' + data.message;
                            }
                            messagesEl.scrollTop = messagesEl.scrollHeight;
                            eventType = null;
                        }
                    }
                }

                // Finalize
                msgDiv.classList.remove('streaming');
                statusRow.style.display = 'none';
                if (thinkingText) {
                    thinkDiv.querySelector('.thinking-toggle').innerHTML = '&#9656; Thinking';
                    thinkDiv.querySelector('.thinking-content').classList.remove('open');
                }
                if (toolsDiv.style.display !== 'none') {
                    var tc = toolsDiv.querySelector('.thinking-content');
                    if (tc) tc.classList.remove('open');
                }
            } catch (err) {
                contentDiv.textContent = 'Error: ' + err.message;
                msgDiv.classList.remove('streaming');
                statusRow.style.display = 'none';
            } finally {
                sending = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function fileToBase64(file) {
            return new Promise(function(resolve) {
                var reader = new FileReader();
                reader.onload = function() { resolve(reader.result.split(',')[1]); };
                reader.readAsDataURL(file);
            });
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        loadAgents();
        loadSessions();
    </script>
</body>
</html>
