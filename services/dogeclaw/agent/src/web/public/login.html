<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogeClaw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --red: #dc2626; --red-dark: #b91c1c; --bg: #0a0a0f; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: #e2e8f0;
            min-height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* Animated background gradients */
        body::before {
            content: ''; position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 800px 600px at 20% 10%, rgba(220,38,38,0.10) 0%, transparent 50%),
                radial-gradient(ellipse 600px 400px at 80% 90%, rgba(220,38,38,0.08) 0%, transparent 50%),
                radial-gradient(ellipse 400px 400px at 50% 50%, rgba(220,38,38,0.04) 0%, transparent 60%);
            animation: bgPulse 12s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes bgPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Floating particles */
        .particle {
            position: fixed; pointer-events: none; z-index: 0;
            opacity: 0.15; animation: float 20s linear infinite;
        }
        .particle img { width: 100%; height: auto; filter: drop-shadow(0 0 20px rgba(220,38,38,0.4)); }
        .p1 { width: 80px; top: 10%; left: 10%; animation-duration: 25s; animation-delay: 0s; opacity: 0.08; }
        .p2 { width: 60px; top: 70%; left: 85%; animation-duration: 30s; animation-delay: -5s; opacity: 0.10; }
        .p3 { width: 100px; top: 50%; left: 5%; animation-duration: 35s; animation-delay: -12s; opacity: 0.06; }
        .p4 { width: 50px; top: 15%; left: 80%; animation-duration: 28s; animation-delay: -8s; opacity: 0.12; }
        .p5 { width: 70px; top: 85%; left: 30%; animation-duration: 32s; animation-delay: -18s; opacity: 0.07; }
        @keyframes float {
            0%   { transform: translate(0, 0) rotate(0deg); }
            25%  { transform: translate(30px, -40px) rotate(90deg); }
            50%  { transform: translate(-20px, -80px) rotate(180deg); }
            75%  { transform: translate(-40px, -30px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* Glow rings behind the logo */
        .glow-ring {
            position: absolute; inset: 0; pointer-events: none; z-index: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .glow-ring::before, .glow-ring::after {
            content: ''; position: absolute; border-radius: 50%;
            border: 1px solid rgba(220,38,38,0.2);
        }
        .glow-ring::before {
            width: 320px; height: 320px;
            animation: ringPulse 4s ease-in-out infinite;
        }
        .glow-ring::after {
            width: 480px; height: 480px;
            animation: ringPulse 4s ease-in-out infinite 2s;
        }
        @keyframes ringPulse {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 0.5; transform: scale(1); }
        }

        /* Login card */
        .login {
            position: relative; z-index: 2;
            background: linear-gradient(135deg, rgba(18,18,28,0.95) 0%, rgba(14,14,22,0.98) 100%);
            border: 1px solid rgba(220,38,38,0.2);
            border-radius: 24px;
            padding: 2.5rem 2.5rem 2rem;
            width: 100%; max-width: 400px;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.6),
                0 0 60px rgba(220,38,38,0.08),
                inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            animation: cardEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            text-align: center; margin-bottom: 1.5rem;
            position: relative;
        }
        .logo img {
            width: 180px; height: auto;
            filter: drop-shadow(0 8px 24px rgba(220,38,38,0.4));
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 8px 24px rgba(220,38,38,0.3)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 12px 32px rgba(220,38,38,0.5)); }
        }

        h1 {
            font-size: 1.6rem; text-align: center; margin-bottom: 0.3rem;
            font-weight: 800; letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #fca5a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center; color: #64748b;
            font-size: 0.8rem; margin-bottom: 1.75rem;
            letter-spacing: 0.02em;
        }

        input {
            width: 100%; padding: 0.85rem 1rem;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            color: #e2e8f0; font-size: 0.9rem;
            margin-bottom: 0.75rem; outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: var(--red);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
        }

        button[type="submit"] {
            width: 100%; padding: 0.85rem;
            border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
            color: #fff; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; margin-top: 0.5rem;
            transition: all 0.2s;
            position: relative; overflow: hidden;
        }
        button[type="submit"]::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        button[type="submit"]:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(220,38,38,0.4);
        }
        button[type="submit"]:hover::after { transform: translateX(100%); }
        button[type="submit"]:active { transform: translateY(0); }

        .error {
            color: #f87171; font-size: 0.8rem;
            text-align: center; margin-top: 0.75rem;
            display: none;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .footer {
            text-align: center;
            color: #475569; font-size: 0.7rem;
            margin-top: 1.25rem;
            letter-spacing: 0.05em;
        }
        .footer .dot { color: var(--red); animation: blink 2s ease-in-out infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <!-- Floating background logos -->
    <div class="particle p1"><img src="/static/logo.png" alt=""></div>
    <div class="particle p2"><img src="/static/logo.png" alt=""></div>
    <div class="particle p3"><img src="/static/logo.png" alt=""></div>
    <div class="particle p4"><img src="/static/logo.png" alt=""></div>
    <div class="particle p5"><img src="/static/logo.png" alt=""></div>

    <!-- Glow rings centered behind login -->
    <div class="glow-ring"></div>

    <div class="login">
        <div class="logo"><img src="/static/logo.png" alt="DogeClaw"></div>
        <h1>DogeClaw</h1>
        <div class="subtitle">wow. much AI. very agent.</div>
        <form id="form">
            <input type="text" name="user" placeholder="Username" autocomplete="username" required>
            <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
            <button type="submit">Sign In</button>
        </form>
        <div class="error" id="error">Invalid credentials</div>
        <div class="footer">SUCH SECURE <span class="dot">●</span> VERY LOGIN <span class="dot">●</span> WOW</div>
    </div>

    <script>
        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = new FormData(e.target);
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user: form.get('user'), password: form.get('password') }),
            });
            if (res.ok) window.location.href = '/';
            else {
                const err = document.getElementById('error');
                err.style.display = 'none';
                requestAnimationFrame(() => { err.style.display = 'block'; });
            }
        });
    </script>
</body>
</html>
