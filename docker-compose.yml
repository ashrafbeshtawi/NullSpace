services:
  traefik:
    image: traefik:v3.4
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - public-web

  # --- Shared Infrastructure ---

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - internal

  # --- Utility Services ---

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    networks:
      - public-web

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - uptime_kuma_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"
    networks:
      - public-web

  glitchtip:
    image: glitchtip/glitchtip
    container_name: glitchtip
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN}
      - DEFAULT_FROM_EMAIL=noreply@beshtawi.online
      - CELERY_WORKER_AUTOSCALE=1,3
      - ENABLE_OBSERVABILITY=True
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.glitchtip.loadbalancer.server.port=8000"
      - "traefik.docker.network=nullspace_public-web"
    networks:
      - public-web
      - internal

  glitchtip-worker:
    image: glitchtip/glitchtip
    container_name: glitchtip-worker
    command: ./bin/run-celery-with-beat.sh
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # --- Admin Panel ---

  admin:
    build: ./services/admin
    container_name: admin
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.admin.loadbalancer.server.port=80"
    networks:
      - public-web

  # --- App Services ---

  main-app:
    build: ./services/default
    container_name: main-app
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.main-app.loadbalancer.server.port=80"
    networks:
      - public-web

networks:
  public-web:
    driver: bridge
  internal:
    driver: bridge

volumes:
  letsencrypt:
  postgres_data:
  redis_data:
  portainer_data:
  uptime_kuma_data:
