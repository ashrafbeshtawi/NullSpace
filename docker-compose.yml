services:
  traefik:
    image: traefik:v3.4
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=beshtawi.ashraf@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080" # access via SSH tunnel only
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - public-web

  app1:
    build: ./services/app1
    container_name: app1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app1.rule=Host(`app1.beshtawi.online`)"
      - "traefik.http.routers.app1.entrypoints=websecure"
      - "traefik.http.routers.app1.tls.certresolver=letsencrypt"
      - "traefik.http.services.app1.loadbalancer.server.port=80"
    networks:
      - public-web

  app2:
    build: ./services/app2
    container_name: app2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app2.rule=Host(`app2.beshtawi.online`)"
      - "traefik.http.routers.app2.entrypoints=websecure"
      - "traefik.http.routers.app2.tls.certresolver=letsencrypt"
      - "traefik.http.services.app2.loadbalancer.server.port=80"
    networks:
      - public-web

  main-app:
    build: ./services/default
    container_name: main-app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.main-app.rule=Host(`beshtawi.online`)"
      - "traefik.http.routers.main-app.entrypoints=websecure"
      - "traefik.http.routers.main-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.main-app.loadbalancer.server.port=80"
    networks:
      - public-web

networks:
  public-web:
    driver: bridge

volumes:
  letsencrypt:
