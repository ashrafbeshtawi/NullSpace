services:
  traefik:
    image: traefik:v3.4
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - public-web

  # --- Shared Infrastructure ---

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # Cluster-level bootstrap. Runs idempotent SQL (scripts/cluster-init.sql)
  # on every `docker compose up`, so adding a new database or role to the
  # cluster is just "edit the SQL, redeploy". Replaces the previous
  # docker-entrypoint-initdb.d bind mount, which only fired on first volume
  # init.
  postgres-init:
    image: postgres:16-alpine
    container_name: postgres-init
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    command:
      - psql
      - -h
      - postgres
      - -U
      - ${POSTGRES_USER}
      - -d
      - postgres
      - -v
      - ON_ERROR_STOP=1
      - -f
      - /cluster-init.sql
    volumes:
      - ./scripts/cluster-init.sql:/cluster-init.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - internal

  # --- Utility Services ---

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    networks:
      - public-web

  # Watchtower — auto-updates containers labelled
  # `com.centurylinklabs.watchtower.enable=true`. Polls every hour and prunes
  # the old image after a successful update. Honors the `depends-on` label so
  # dogeclaw-migrations is rolled before the dogeclaw agent itself.
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    command:
      - --label-enable
      - --interval=60
      - --cleanup
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - internal

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - uptime_kuma_data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"
    networks:
      - public-web

  glitchtip:
    image: glitchtip/glitchtip
    container_name: glitchtip
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN:-}
      - DEFAULT_FROM_EMAIL=noreply@${DOMAIN}
      - CELERY_WORKER_AUTOSCALE=1,3
      - ENABLE_OBSERVABILITY=True
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.glitchtip.loadbalancer.server.port=8000"
      - "traefik.docker.network=nullspace_public-web"
    networks:
      - public-web
      - internal

  glitchtip-worker:
    image: glitchtip/glitchtip
    container_name: glitchtip-worker
    command: ./bin/run-celery-with-beat.sh
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/glitchtip
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # --- Admin Panel ---

  admin:
    build: ./services/admin
    container_name: admin
    # Mounting docker.sock + the repo gives the admin page enough access to
    # run the maintenance scripts in ./bin/ (deploy, backup, renew-certs).
    # Effectively root-on-host, so this service stays behind basic auth in
    # prod (see docker-compose.prod.yml). The /var/backups bind mount lets
    # backup-postgres.sh write dumps to the host's standard backup location.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/opt/NullSpace
      - /var/backups/nullspace:/var/backups/nullspace
      # Read-only access to the host's /proc and /sys so the dashboard can
      # report real host CPU/RAM. On macOS Docker Desktop these resolve to
      # the Linux VM (not the Mac), so dev values are the VM's, not the host's.
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.admin.loadbalancer.server.port=80"
    networks:
      - public-web

  # --- App Services ---

  # Ollama runs on demand only (heavy on resources)
  # Start with: docker compose --profile manual up -d ollama
  ollama:
    build: ./services/ollama
    container_name: ollama
    profiles: ["manual"]
    environment:
      - OLLAMA_DEFAULT_MODEL=${OLLAMA_DEFAULT_MODEL:-gemma4:e2b}
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal

  # DogeClaw agent — auto-starts when the "full" profile is active.
  # Source: github.com/ashrafbeshtawi/dogeclaw. Connects to the dedicated
  # `dogeclaw` database (provisioned by postgres-init) using the cluster's
  # main POSTGRES_USER credentials.
  dogeclaw:
    image: ghcr.io/ashrafbeshtawi/dogeclaw:latest
    container_name: dogeclaw
    profiles: ["full"]
    environment:
      - DOGECLAW_OLLAMA_URL=${DOGECLAW_OLLAMA_URL:-http://ollama:11434}
      - DOGECLAW_PORT=${DOGECLAW_PORT:-3000}
      - DOGECLAW_WEB_USER=${DOGECLAW_WEB_USER:-admin}
      - DOGECLAW_WEB_PASSWORD=${DOGECLAW_WEB_PASSWORD:-changeme}
      - DOGECLAW_WEB_SECRET=${DOGECLAW_WEB_SECRET:-dogeclaw-change-me}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=dogeclaw
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DOGECLAW_TELEGRAM_MODE=${DOGECLAW_TELEGRAM_MODE:-polling}
      - DOGECLAW_WEBHOOK_URL=${DOGECLAW_WEBHOOK_URL:-}
    volumes:
      - agent_workspace:/root/agent-workspace
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.dogeclaw.loadbalancer.server.port=3000"
      - "traefik.docker.network=nullspace_public-web"
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - public-web
      - internal

  kiwelt:
    image: ghcr.io/ashrafbeshtawi/kiwelt:latest
    container_name: kiwelt
    environment:
      - DOMAIN=${DOMAIN}
      # SMTP transport — pulled from .env on the host; overridden in dev to
      # point at the local mailpit container (see docker-compose.override.yml).
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - MAIL_TO_CONTACT=${MAIL_TO_CONTACT:-}
      - MAIL_TO_KARRIERE=${MAIL_TO_KARRIERE:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.kiwelt.loadbalancer.server.port=3000"
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - public-web

networks:
  public-web:
    driver: bridge
  internal:
    driver: bridge

volumes:
  letsencrypt:
  postgres_data:
  redis_data:
  portainer_data:
  uptime_kuma_data:
  ollama_data:
  agent_workspace:
